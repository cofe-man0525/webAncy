server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: papercheck-agent-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/papercheck_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: sdx121380303.
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  jwt:
    secret: "papercheck-agent-jwt-secret-at-least-32-bytes-long"
    expire-minutes: 10080
  storage:
    local-root: ./data/uploads
  rabbit:
    enabled: false
    exchange: papercheck.analysis.exchange
    routing-key: papercheck.analysis.created
  ai-service:
    enabled: true
    base-url: http://localhost:8090
  mock-analysis:
    enabled: false
